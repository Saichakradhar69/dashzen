<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="900" height="580" fill="#0f0f14"/>

  <text x="450" y="44" text-anchor="middle" fill="#555" font-size="13" letter-spacing="3">DASHZEN — LOGO OPTIONS (TEAL PALETTE)</text>

  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ba98b"/>
      <stop offset="100%" stop-color="#1d7a63"/>
    </linearGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2fbc9a"/>
      <stop offset="100%" stop-color="#1d7a63"/>
