  </text>
  <text x="566" y="170" font-size="10.5" fill="#999" letter-spacing="2.5">AI DASHBOARD PLATFORM</text>

  <!-- ── ICON ONLY — various sizes ── -->
  <text x="450" y="278" text-anchor="middle" fill="#444" font-size="10" letter-spacing="2">ICON — SCALABILITY TEST</text>

  <!-- 64px -->
  <g transform="translate(180, 330)">
    <rect x="-32" y="-32" width="64" height="64" rx="15" fill="url(#tg2)"/>
    <polyline points="-16,12 -6,-8 5,2 18,-18" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="-18" r="4" fill="white" opacity="0.9"/>
