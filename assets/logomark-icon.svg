  <!-- ── DARK BG VERSION ── -->
  <rect x="60" y="70" width="380" height="160" rx="16" fill="#1a1a24" stroke="#2a2a3a" stroke-width="1"/>
  <text x="250" y="96" text-anchor="middle" fill="#444" font-size="10" letter-spacing="2">DARK BACKGROUND</text>

  <g transform="translate(118, 158)">
    <rect x="-28" y="-28" width="56" height="56" rx="13" fill="url(#tg2)"/>
    <polyline points="-14,10 -5,-6 4,2 16,-16" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="-16" r="3.5" fill="white" opacity="0.9"/>
  </g>

  <text x="165" y="148" font-size="38" font-weight="800" letter-spacing="-1.5">
    <tspan fill="white">Dash</tspan><tspan fill="#2fbc9a">Zen</tspan>
  </text>
  <text x="166" y="170" font-size="10.5" fill="#666" letter-spacing="2.5">AI DASHBOARD PLATFORM</text>

  <!-- ── LIGHT BG VERSION ── -->
  <rect x="460" y="70" width="380" height="160" rx="16" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle" fill="#aaa" font-size="10" letter-spacing="2">LIGHT BACKGROUND</text>

  <g transform="translate(518, 158)">
    <rect x="-28" y="-28" width="56" height="56" rx="13" fill="url(#tg2)"/>
    <polyline points="-14,10 -5,-6 4,2 16,-16" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="16" cy="-16" r="3.5" fill="white" opacity="0.9"/>
