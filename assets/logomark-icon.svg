  <rect x="195" y="432" width="60" height="26" rx="7" fill="#2fbc9a"/>
  <text x="225" y="474" text-anchor="middle" fill="#666" font-size="9">#2FBC9A</text>
  <text x="225" y="485" text-anchor="middle" fill="#555" font-size="8">Primary</text>

  <rect x="275" y="432" width="60" height="26" rx="7" fill="#1d9c7e"/>
  <text x="305" y="474" text-anchor="middle" fill="#666" font-size="9">#1D9C7E</text>
  <text x="305" y="485" text-anchor="middle" fill="#555" font-size="8">Dark Teal</text>

  <rect x="355" y="432" width="60" height="26" rx="7" fill="#2ba98b"/>
  <text x="385" y="474" text-anchor="middle" fill="#666" font-size="9">#2BA98B</text>
  <text x="385" y="485" text-anchor="middle" fill="#555" font-size="8">Mid</text>

  <rect x="435" y="432" width="60" height="26" rx="7" fill="#111111"/>
  <text x="465" y="474" text-anchor="middle" fill="#666" font-size="9">#111111</text>
  <text x="465" y="485" text-anchor="middle" fill="#555" font-size="8">Text</text>

  <rect x="515" y="432" width="60" height="26" rx="7" fill="#1a1a24"/>
  <text x="545" y="474" text-anchor="middle" fill="#666" font-size="9">#1A1A24</text>
  <text x="545" y="485" text-anchor="middle" fill="#555" font-size="8">Dark BG</text>

  <rect x="595" y="432" width="60" height="26" rx="7" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  <text x="625" y="474" text-anchor="middle" fill="#666" font-size="9">#FFFFFF</text>
  <text x="625" y="485" text-anchor="middle" fill="#555" font-size="8">White</text>

  <text x="450" y="540" text-anchor="middle" fill="#333" font-size="10" letter-spacing="1">DashZen — Confidential — April 2026</text>
